[build]
  command = "npm run build"
  publish = ".netlify/output/public"
  functions = ".netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Environment variables will be set in Netlify dashboard
# NEXT_PUBLIC_* variables for client-side
# Server-side variables for API routes

